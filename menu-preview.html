<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Mobile First Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lifeflow Bottom Navigation</title>
  
  <!-- Fuente Space Grotesk -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* DESIGN TOKENS */
    :root {
      --bg: #01191D;
      --surface: #0D2B30;
      --mint: #AEFEF0;
      --mint-active: rgba(174, 254, 240, 1);
      --mint-inactive: rgba(174, 254, 240, 0.40);
      --border: rgba(174, 254, 240, 0.08);
      --font: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      /* FONDO DE PANTALLA */
      background-color: var(--bg);
      background-image: radial-gradient(circle, rgba(174, 254, 240, 0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      font-family: var(--font);
      height: 100vh;
      display: flex;
      justify-content: center;
      color: var(--mint);
    }

    /* CONTENEDOR APP SIMULADA (max-width desktop support) */
    .app-container {
      width: 100%;
      max-width: 430px;
      height: 100%;
      position: relative;
      background-color: transparent;
      display: flex;
      flex-direction: column;
    }

    /* CONTENIDO PLACEHOLDER */
    .content-area {
      flex: 1;
      padding: 40px 20px;
      color: var(--mint-inactive);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .content-area h1 {
      font-size: 24px;
      color: var(--mint);
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }
    
    .content-area p {
      font-size: 14px;
      opacity: 0.6;
      max-width: 280px;
      line-height: 1.5;
    }

    /* BOTTOM NAV BAR */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 60px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
    }

    /* TAB ITEM */
    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 16.66%;
      height: 100%;
      color: var(--mint-inactive);
      cursor: pointer;
      position: relative;
      transition: transform 100ms ease;
      /* Mobile touch target minimums */
      min-width: 44px;
      min-height: 44px;
    }

    /* ESTADO PRESS (touchstart/mousedown) */
    .nav-tab:active {
      transform: scale(0.92);
    }

    .nav-tab svg {
      width: 24px;
      height: 24px;
      margin-bottom: 4px;
      stroke: currentColor;
    }

    .nav-tab span {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* BORDER EN EL TOP DEL ITEM USANDO PSEUDOELEMENTO PARA CONTROL PERFECTO */
    .nav-tab::before {
      content: '';
      position: absolute;
      top: -1px; /* Montado en el border-top del container */
      left: 0;
      width: 100%;
      height: 2px;
      background-color: var(--mint-active);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    /* ESTADO ACTIVO */
    .nav-tab.active {
      color: var(--mint-active);
    }
    
    .nav-tab.active::before {
      opacity: 1;
    }

  </style>
</head>
<body>

  <div class="app-container">
    <div class="content-area">
      <h1 id="screen-title">COMANDO</h1>
      <p>Vista exclusiva sin duplicados. Solo 1 Bottom Navigation Bar visible nativamente usando diseño Soberano.</p>
    </div>

    <!-- 1 SOLO MENÚ -->
    <nav class="bottom-nav" id="nav-bar">
      <!-- COMANDO -->
      <div class="nav-tab active" data-tab="comando">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Comando</span>
      </div>

      <!-- BITÁCORA -->
      <div class="nav-tab" data-tab="bitácora">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        <span>Bitácora</span>
      </div>

      <!-- AVATAR -->
      <div class="nav-tab" data-tab="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="7" r="4"></circle>
          <path d="M5.5 21v-2a4 4 0 0 1 4-4h5a4 4 0 0 1 4 4v2"></path>
        </svg>
        <span>Avatar</span>
      </div>

      <!-- MENTOR -->
      <div class="nav-tab" data-tab="mentor">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a2 2 0 0 1 2 2v1h5.5a1.5 1.5 0 0 1 1.5 1.5v11a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5v-11A1.5 1.5 0 0 1 4.5 5H10V4a2 2 0 0 1 2-2z"></path>
          <path d="M9 10v2"></path>
          <path d="M15 10v2"></path>
          <path d="M10 14h4"></path>
        </svg>
        <span>Mentor</span>
      </div>

      <!-- COMUNIDAD -->
      <div class="nav-tab" data-tab="comunidad">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span>Comunidad</span>
      </div>

      <!-- ROADMAP -->
      <div class="nav-tab" data-tab="roadmap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
          <line x1="8" y1="2" x2="8" y2="18"></line>
          <line x1="16" y1="6" x2="16" y2="22"></line>
        </svg>
        <span>Roadmap</span>
      </div>
    </nav>
  </div>

  <script>
    // ESTADO EN MEMORIA VERIFICADO CLARAMENTE
    let activeTab = 'comando';

    // ELEMENTOS DOM
    const tabs = document.querySelectorAll('.nav-tab');
    const screenTitle = document.getElementById('screen-title');

    // ACTUALIZA EL RENDER BASADO EN ESTADO
    function switchTab(e) {
      const targetTab = e.target.closest('.nav-tab');
      if (!targetTab) return;

      const newActive = targetTab.getAttribute('data-tab');
      if (newActive === activeTab) return; 

      // 1. SET ACTIVE STATE IN MEMORY
      activeTab = newActive;

      // 2. RENDER COMPONENTS
      tabs.forEach(tab => {
        if (tab.getAttribute('data-tab') === activeTab) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });

      // 3. ACTUALIZAR UI PLACEHOLDER
      screenTitle.textContent = activeTab;
    }

    // EVENTOS
    tabs.forEach(tab => {
      // CLICK para Desktop/Mobile
      tab.addEventListener('click', switchTab);
      
      // Optimizamos toque sutil en mobile para la escala reactiva
      tab.addEventListener('touchstart', (e) => {
        tab.style.transform = 'scale(0.92)';
      }, {passive: true});
      
      tab.addEventListener('touchend', (e) => {
        tab.style.transform = '';
      }, {passive: true});
      
      tab.addEventListener('touchcancel', (e) => {
        tab.style.transform = '';
      }, {passive: true});
    });
  </script>
</body>
</html>
